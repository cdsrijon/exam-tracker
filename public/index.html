<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #14151a;
    --surface: #1f212a;
    --surface-2: #262933;
    --border: #33363f;
    --border-soft: #2a2d36;
    --text: #edeae3;
    --text-dim: #9a9daa;
    --text-faint: #636672;

    --book: #e0a458;
    --book-dim: rgba(224,164,88,.13);
    --sql: #5ec8c2;
    --sql-dim: rgba(94,200,194,.13);
    --code: #e0637a;
    --code-dim: rgba(224,99,122,.13);
    --res: #9b8de0;
    --res-dim: rgba(155,141,224,.13);
    --good: #8bbf8b;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; background: transparent; }
  body{
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
  }
  #app{
    max-width: 1000px;
    margin: 0 auto;
    padding: 28px 20px 64px;
    animation: riseIn .5s ease both;
  }
  @keyframes riseIn{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform: translateY(0);} }
  @media (prefers-reduced-motion: reduce){ #app{ animation:none; } * { transition:none !important; } }

  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--text-faint); }

  /* ---------- Header ---------- */
  header{ display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px; border-bottom:1px solid var(--border-soft); padding-bottom:22px; margin-bottom:18px; }
  h1{ font-family:'Fraunces', serif; font-style:italic; font-weight:500; font-size:34px; margin:4px 0 0; letter-spacing:-.01em; }
  .stat-row{ display:flex; gap:26px; flex-wrap:wrap; }
  .stat{ text-align:right; }
  .stat .num{ font-family:'JetBrains Mono', monospace; font-size:22px; font-weight:600; line-height:1; }
  .stat .lbl{ font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); margin-top:5px; }
  .stat.accent .num{ color:var(--code); }

  /* ---------- Tabs ---------- */
  .tabnav{ display:flex; gap:2px; border-bottom:1px solid var(--border-soft); margin-bottom:22px; overflow-x:auto; }
  .tabnav button{ background:none; border:none; color:var(--text-faint); font-family:'JetBrains Mono', monospace; font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; padding:11px 15px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; }
  .tabnav button:hover{ color:var(--text); }
  .tabnav button.active{ color:var(--text); border-bottom-color:var(--code); }

  /* ---------- Track summary cards (overview) ---------- */
  .tracks{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px; }
  @media (max-width:680px){ .tracks{ grid-template-columns:1fr; } }
  .track{ background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:16px 18px; }
  .track .top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .track .name{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); }
  .track .count{ font-family:'JetBrains Mono', monospace; font-size:20px; font-weight:600; }
  .track .count small{ font-size:12px; font-weight:400; color:var(--text-faint); }
  .bar{ height:7px; border-radius:4px; background:var(--surface-2); overflow:hidden; }
  .bar > div{ height:100%; border-radius:4px; transition:width .4s ease; }
  .track.book .bar > div{ background:var(--book); }
  .track.sql .bar > div{ background:var(--sql); }
  .track.code .bar > div{ background:var(--code); }

  /* ---------- Section shell ---------- */
  section{ margin-bottom:26px; }
  .section-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .section-head h2{ font-family:'Fraunces', serif; font-weight:600; font-size:17px; margin:0; }
  .section-head .hint{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint); }

  /* ---------- Reflection / log today ---------- */
  .log-panel{ background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:16px 18px; }
  .log-panel textarea{ width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:10px 12px; font-family:'Inter',sans-serif; font-size:13px; min-height:44px; resize:vertical; margin-bottom:10px; }
  .logged-note{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--good); }

  /* ---------- Heatmap ---------- */
  .heatmap-wrap{ background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:20px 20px 16px; }
  .heatmap{ display:grid; grid-template-columns:repeat(10,1fr); gap:6px; }
  @media (max-width:560px){ .heatmap{ grid-template-columns:repeat(6,1fr); } }
  .cell{ position:relative; aspect-ratio:1; border-radius:4px; background:var(--surface-2); border:1px solid var(--border-soft); }
  .cell.future{ opacity:.35; }
  .cell.today{ box-shadow:0 0 0 2px var(--code); }
  .cell .num{ position:absolute; top:3px; left:4px; font-family:'JetBrains Mono', monospace; font-size:8px; color:var(--text-faint); }
  .heatmap-legend{ display:flex; align-items:center; gap:6px; margin-top:14px; font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-faint); }
  .heatmap-legend .sq{ width:11px; height:11px; border-radius:3px; border:1px solid var(--border-soft); }

  /* ---------- Buttons ---------- */
  .btn{ border:none; border-radius:7px; padding:9px 18px; font-family:'JetBrains Mono', monospace; font-weight:600; font-size:12.5px; cursor:pointer; transition:filter .15s ease, transform .15s ease; }
  .btn:hover{ filter:brightness(1.08); }
  .btn:active{ transform:scale(.97); }
  .btn.sql{ background:var(--sql); color:#0c2422; }
  .btn.code{ background:var(--code); color:#1b1013; }
  .btn.res{ background:var(--res); color:#1a1630; }
  .btn.book{ background:var(--book); color:#231604; }
  .btn.ghost{ background:none; border:1px solid var(--border); color:var(--text-dim); }

  /* ---------- Entry forms ---------- */
  .entry-form{ background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:18px; display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:18px; }
  .entry-form .full{ grid-column:1/-1; }
  .entry-form label{ display:block; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; }
  .entry-form input, .entry-form select, .entry-form textarea{ width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:8px 10px; font-family:'Inter',sans-serif; font-size:13px; }
  .entry-form textarea{ min-height:64px; resize:vertical; font-family:'JetBrains Mono', monospace; font-size:12.5px; }
  .cat-add-row{ display:flex; gap:6px; align-items:center; }
  .cat-add-row input{ flex:1; }

  /* ---------- Filter chips ---------- */
  .chip-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .chip{ font-family:'JetBrains Mono', monospace; font-size:11px; padding:5px 11px; border-radius:20px; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; background:none; }
  .chip.active{ background:var(--surface-2); color:var(--text); border-color:var(--text-dim); }

  /* ---------- Entry cards (sql/coding/resources) ---------- */
  .entry-card{ background:var(--surface); border:1px solid var(--border-soft); border-radius:10px; padding:14px 16px; margin-bottom:10px; }
  .entry-card .row1{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .entry-card .title{ font-family:'Inter', sans-serif; font-weight:600; font-size:14px; }
  .entry-card .title a{ color:var(--text); text-decoration:none; border-bottom:1px dotted var(--text-faint); }
  .entry-card .title a:hover{ color:var(--res); border-bottom-color:var(--res); }
  .entry-card .meta{ font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--text-faint); margin-top:4px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .entry-card .desc{ font-size:12.5px; color:var(--text-dim); margin-top:9px; line-height:1.5; }
  .entry-card .answer-toggle{ margin-top:9px; background:none; border:none; font-family:'JetBrains Mono', monospace; font-size:11px; cursor:pointer; padding:0; }
  .entry-card.sql .answer-toggle{ color:var(--sql); }
  .entry-card.code .answer-toggle{ color:var(--code); }
  .entry-card .answer-box{ display:none; margin-top:8px; background:var(--surface-2); border:1px solid var(--border-soft); border-radius:7px; padding:10px 12px; font-family:'JetBrains Mono', monospace; font-size:12px; white-space:pre-wrap; color:var(--text); }
  .entry-card .answer-box.open{ display:block; }
  .del{ background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:17px; line-height:1; padding:2px 6px; flex:none; }
  .del:hover{ color:var(--code); }
  .pill{ display:inline-block; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.03em; padding:3px 9px; border-radius:20px; border:1px solid var(--border); color:var(--text-dim); }
  .pill.topic-sql{ border-color:var(--sql); color:var(--sql); }
  .pill.topic-code{ border-color:var(--code); color:var(--code); }
  .pill.cat{ border-color:var(--res); color:var(--res); }
  .feel-badge{ font-family:'JetBrains Mono', monospace; font-size:10px; padding:3px 9px; border-radius:20px; }
  .feel-badge.confident{ background:rgba(139,191,139,.15); color:var(--good); }
  .feel-badge.neutral{ background:rgba(224,164,88,.15); color:var(--book); }
  .feel-badge.struggled{ background:rgba(224,99,122,.15); color:var(--code); }
  .empty-note{ font-family:'JetBrains Mono', monospace; font-size:12px; color:var(--text-faint); padding:14px 2px; }

  /* ---------- Chapters ---------- */
  .chapters-progress{ margin-bottom:18px; }
  .chapter-card{ background:var(--surface); border:1px solid var(--border-soft); border-radius:9px; padding:11px 14px; margin-bottom:8px; }
  .chapter-card .main-row{ display:flex; align-items:center; gap:10px; }
  .chapter-card .box{ width:16px; height:16px; border-radius:4px; border:1.5px solid var(--text-faint); flex:none; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .chapter-card.done .box{ background:var(--book); border-color:var(--book); }
  .chapter-card.done .box::after{ content:''; width:5px; height:8px; border:solid #231604; border-width:0 1.6px 1.6px 0; transform:rotate(45deg) translate(-1px,-1px); }
  .chapter-card .cname{ font-size:13px; font-family:'Inter', sans-serif; outline:none; flex:1; min-width:0; }
  .chapter-card.done .cname{ color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--text-faint); }
  .chapter-card .summary-line{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint); margin-left:26px; margin-top:4px; }
  .expand-btn{ background:none; border:none; color:var(--text-faint); cursor:pointer; font-family:'JetBrains Mono', monospace; font-size:15px; padding:2px 6px; flex:none; transition:transform .15s ease; }
  .expand-btn.open{ transform:rotate(90deg); }
  .chapter-details{ display:none; margin-top:12px; padding-top:12px; border-top:1px dashed var(--border-soft); grid-template-columns:1fr 1fr; gap:10px; margin-left:26px; }
  .chapter-details.open{ display:grid; }
  .chapter-details label{ display:block; font-family:'JetBrains Mono', monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-faint); margin-bottom:6px; }
  .chapter-details select, .chapter-details input{ width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:7px 9px; font-family:'Inter',sans-serif; font-size:12.5px; }

  /* ---------- Footer ---------- */
  footer{ margin-top:30px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
  .reset-btn{ background:none; border:1px solid var(--border); color:var(--text-faint); font-family:'JetBrains Mono', monospace; font-size:11px; padding:7px 12px; border-radius:7px; cursor:pointer; }
  .reset-btn.confirm{ color:var(--code); border-color:var(--code); }
  .saved-tag{ font-family:'JetBrains Mono', monospace; font-size:10.5px; color:var(--text-faint); }
</style>

<div id="app">
  <div class="eyebrow">loading tracker…</div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'exam-tracker-v2';
  const TOTAL_CHAPTERS = 22;
  const TOTAL_DAYS = 60;
  const SQL_TOPICS = ['Joins','Subqueries','Aggregate Functions','Window Functions','Group By / Having','CTE','Indexes','Normalization','Transactions','Stored Procedures','Views','Union','Date Functions','String Functions','Null Handling','Other'];
  const CODE_TAGS = ['Array','String','Linked List','Tree','Graph','Dynamic Programming','Greedy','Two Pointers','Sliding Window','Backtracking','Heap','Stack / Queue','Binary Search','Math','Bit Manipulation','Hash Table','Sorting','Recursion','Other'];

  let state = null;
  let resetArmed = false;
  const uiState = { activeTab: 'overview', sqlTopicFilter: 'All', resCatFilter: 'All', addingCategory: false };

  // ---------- date helpers ----------
  function dstr(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function todayStr(){ return dstr(new Date()); }
  function parseDate(s){ return new Date(s + 'T00:00:00'); }
  function addDays(s, n){ const d = parseDate(s); d.setDate(d.getDate()+n); return dstr(d); }
  function dayNumber(){ return Math.round((parseDate(todayStr()) - parseDate(state.startDate)) / 86400000) + 1; }
  function fmtDate(s){ if(!s) return ''; return parseDate(s).toLocaleDateString(undefined, { month:'short', day:'numeric' }); }
  function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function esc(s){ return String(s||'').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }

  // ---------- storage ----------
  function defaultState(){
    return {
      startDate: todayStr(),
      sqlTarget: 60,
      codingTarget: 100,
      chapters: Array.from({length: TOTAL_CHAPTERS}, (_,i) => ({ id:i+1, name:`Chapter ${i+1}`, done:false, doneDate:null, feeling:'', examMarks:'' })),
      dailyLog: {},
      sqlProblems: [],
      codingProblems: [],
      resourceCategories: ['Book Notes','SQL','Coding','Video','Article','Tool','Other'],
      resources: []
    };
  }

  function migrate(loaded){
    const def = defaultState();
    const chapters = (Array.isArray(loaded.chapters) && loaded.chapters.length === TOTAL_CHAPTERS)
      ? loaded.chapters.map((c,i) => ({ id:c.id ?? i+1, name:c.name ?? `Chapter ${i+1}`, done:!!c.done, doneDate:c.doneDate ?? null, feeling:c.feeling ?? '', examMarks:c.examMarks ?? '' }))
      : def.chapters;
    return {
      startDate: loaded.startDate || def.startDate,
      sqlTarget: loaded.sqlTarget || def.sqlTarget,
      codingTarget: loaded.codingTarget || def.codingTarget,
      chapters,
      dailyLog: loaded.dailyLog || {},
      sqlProblems: Array.isArray(loaded.sqlProblems) ? loaded.sqlProblems : [],
      codingProblems: Array.isArray(loaded.codingProblems) ? loaded.codingProblems : [],
      resourceCategories: (Array.isArray(loaded.resourceCategories) && loaded.resourceCategories.length) ? loaded.resourceCategories : def.resourceCategories,
      resources: Array.isArray(loaded.resources) ? loaded.resources : []
    };
  }

  async function loadState(){
    try{
      const res = await window.storage.get(STORAGE_KEY);
      if (res && res.value) return migrate(JSON.parse(res.value));
    } catch(e){ /* nothing stored yet */ }
    const def = defaultState();
    await persist(def);
    return def;
  }

  async function persist(){
    try{ const ok = await window.storage.set(STORAGE_KEY, JSON.stringify(state)); showSaved(!!ok); }
    catch(e){ showSaved(false, true); }
  }
  function showSaved(ok, failed){
    const tag = document.getElementById('savedTag');
    if (!tag) return;
    if (failed){ tag.textContent = 'not saved — connection issue'; return; }
    tag.textContent = 'saved ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  // ---------- derived stats ----------
  function totals(){
    const chaptersDone = state.chapters.filter(c => c.done).length;
    return { sql: state.sqlProblems.length, coding: state.codingProblems.length, chaptersDone };
  }
  function isActiveDay(key){
    const hasSql = state.sqlProblems.some(p => p.date === key);
    const hasCoding = state.codingProblems.some(p => p.date === key);
    const hasChapter = state.chapters.some(c => c.doneDate === key);
    const note = state.dailyLog[key] && state.dailyLog[key].note && state.dailyLog[key].note.trim() !== '';
    return hasSql || hasCoding || hasChapter || !!note;
  }
  function activityScore(key){
    const sqlCount = state.sqlProblems.filter(p => p.date === key).length;
    const codingCount = state.codingProblems.filter(p => p.date === key).length;
    const chapCount = state.chapters.filter(c => c.doneDate === key).length;
    return sqlCount + codingCount + chapCount * 3;
  }
  function computeStreak(){
    let streak = 0;
    let cursor = new Date();
    if (isActiveDay(dstr(cursor))) streak++;
    cursor.setDate(cursor.getDate() - 1);
    while (true){
      const key = dstr(cursor);
      if (isActiveDay(key)) { streak++; cursor.setDate(cursor.getDate() - 1); }
      else break;
    }
    return streak;
  }
  function feelLabel(v){ return v === 'confident' ? 'Confident' : v === 'neutral' ? 'Okay' : v === 'struggled' ? 'Struggled' : ''; }
  function feelClass(v){ return v === 'confident' ? 'confident' : v === 'neutral' ? 'neutral' : v === 'struggled' ? 'struggled' : ''; }

  // ---------- main render ----------
  function render(){
    const t = totals();
    const dn = dayNumber();
    const daysLeft = TOTAL_DAYS - dn;
    const streak = computeStreak();
    const chaptersPct = Math.round((t.chaptersDone / TOTAL_CHAPTERS) * 100);
    const sqlPct = Math.min(100, Math.round((t.sql / state.sqlTarget) * 100));
    const codingPct = Math.min(100, Math.round((t.coding / state.codingTarget) * 100));
    const overallPct = Math.round((chaptersPct + sqlPct + codingPct) / 3);

    const app = document.getElementById('app');
    app.innerHTML = `
      <header>
        <div>
          <div class="eyebrow">60-day sprint · started ${fmtDate(state.startDate)}</div>
          <h1>Exam Prep Log</h1>
        </div>
        <div class="stat-row">
          <div class="stat"><div class="num">${dn > 0 ? dn : '—'}<span style="color:var(--text-faint); font-weight:400;">/${TOTAL_DAYS}</span></div><div class="lbl">Day</div></div>
          <div class="stat"><div class="num">${daysLeft >= 0 ? daysLeft : 'over'}</div><div class="lbl">${daysLeft >= 0 ? 'days left' : 'by ' + Math.abs(daysLeft) + ' days'}</div></div>
          <div class="stat accent"><div class="num">${streak}</div><div class="lbl">day streak</div></div>
          <div class="stat"><div class="num">${overallPct}%</div><div class="lbl">overall</div></div>
        </div>
      </header>

      <div class="tabnav" id="tabnav">
        ${tabButton('overview','Overview')}
        ${tabButton('sql','SQL Log')}
        ${tabButton('coding','Coding Log')}
        ${tabButton('chapters','Chapters')}
        ${tabButton('resources','Resources')}
      </div>

      <div id="tabContent"></div>

      <footer>
        <button class="reset-btn" id="resetBtn">Reset all data</button>
        <span class="saved-tag" id="savedTag"></span>
      </footer>
    `;

    document.querySelectorAll('#tabnav button').forEach(b => {
      b.addEventListener('click', () => { uiState.activeTab = b.dataset.tab; renderTabContent(); syncTabButtons(); });
    });

    const resetBtn = document.getElementById('resetBtn');
    resetBtn.addEventListener('click', () => {
      if (!resetArmed){
        resetArmed = true;
        resetBtn.textContent = 'Click again to confirm reset';
        resetBtn.classList.add('confirm');
        setTimeout(() => { resetArmed = false; resetBtn.textContent = 'Reset all data'; resetBtn.classList.remove('confirm'); }, 3500);
      } else {
        state = defaultState();
        persist();
        resetArmed = false;
        render();
      }
    });

    renderTabContent();
  }

  function tabButton(id, label){ return `<button data-tab="${id}" class="${uiState.activeTab===id?'active':''}">${label}</button>`; }
  function syncTabButtons(){ document.querySelectorAll('#tabnav button').forEach(b => b.classList.toggle('active', b.dataset.tab === uiState.activeTab)); }

  function renderTabContent(){
    const el = document.getElementById('tabContent');
    if (uiState.activeTab === 'overview') { el.innerHTML = overviewHtml(); attachOverviewHandlers(); }
    else if (uiState.activeTab === 'sql') { el.innerHTML = sqlTabHtml(); attachSqlHandlers(); }
    else if (uiState.activeTab === 'coding') { el.innerHTML = codingTabHtml(); attachCodingHandlers(); }
    else if (uiState.activeTab === 'chapters') { el.innerHTML = chaptersTabHtml(); attachChaptersHandlers(); }
    else if (uiState.activeTab === 'resources') { el.innerHTML = resourcesTabHtml(); attachResourcesHandlers(); }
  }

  // ===================== OVERVIEW =====================
  function overviewHtml(){
    const t = totals();
    const chaptersPct = Math.round((t.chaptersDone / TOTAL_CHAPTERS) * 100);
    const sqlPct = Math.min(100, Math.round((t.sql / state.sqlTarget) * 100));
    const codingPct = Math.min(100, Math.round((t.coding / state.codingTarget) * 100));
    const todayKey = todayStr();
    const todayNote = (state.dailyLog[todayKey] && state.dailyLog[todayKey].note) || '';

    return `
      <div class="tracks">
        <div class="track book">
          <div class="top"><span class="name">Book · Chapters</span><span class="count">${t.chaptersDone}<small> / ${TOTAL_CHAPTERS}</small></span></div>
          <div class="bar"><div style="width:${chaptersPct}%"></div></div>
        </div>
        <div class="track sql">
          <div class="top"><span class="name">SQL · LeetCode</span><span class="count">${t.sql}<small> / ${state.sqlTarget}</small></span></div>
          <div class="bar"><div style="width:${sqlPct}%"></div></div>
        </div>
        <div class="track code">
          <div class="top"><span class="name">Coding · LeetCode</span><span class="count">${t.coding}<small> / ${state.codingTarget}</small></span></div>
          <div class="bar"><div style="width:${codingPct}%"></div></div>
        </div>
      </div>

  function renderHeatmap(){
    const grid = document.getElementById('heatmapGrid');
    if (!grid) return;
    const dn = dayNumber();
    let html = '';
    for (let i = 1; i <= TOTAL_DAYS; i++){
      const key = addDays(state.startDate, i - 1);
      const score = activityScore(key);
      const isFuture = i > dn;
      const isToday = i === dn;
      let bg = 'var(--surface-2)';
      if (!isFuture && score > 0){
        if (score >= 10) bg = '#5ec8c2';
        else if (score >= 6) bg = 'rgba(94,200,194,.85)';
        else if (score >= 3) bg = 'rgba(94,200,194,.6)';
        else bg = 'rgba(94,200,194,.35)';
      }
      html += `<div class="cell ${isFuture?'future':''} ${isToday?'today':''}" style="background:${bg}" title="Day ${i} · ${fmtDate(key)}${score?' · score ' + score:''}"><span class="num">${i}</span></div>`;
    }
    grid.innerHTML = html;
  }

  // ============ MULTI-PROFILE SYSTEM ============
  const API_BASE = window.location.origin + '/api';
  let currentProfile = null;
  let currentPassword = '';
  
  async function loadProfile(profileId, password = '') {
    try {
      const url = `${API_BASE}/profile/${profileId}?password=${encodeURIComponent(password)}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Invalid password or profile not found');
      const data = await res.json();
      state = data.data || state;
      currentProfile = { id: profileId, password };
      currentPassword = password;
      localStorage.setItem('currentProfile', profileId);
      if (password) localStorage.setItem('profilePassword', password);
      render();
      addProfileButton();
    } catch (e) {
      alert('Error loading profile: ' + e.message);
    }
  }
  
  async function saveProfile() {
    if (!currentProfile) return;
    try {
      await fetch(`${API_BASE}/profile/${currentProfile.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: currentPassword, data: state })
      });
    } catch (e) {
      console.error('Error saving profile:', e);
    }
  }
  
  async function createProfile(name, profileId, password = '') {
    try {
      const res = await fetch(`${API_BASE}/profile/${profileId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password })
      });
      if (!res.ok) throw new Error(res.statusText);
      const saved = JSON.parse(localStorage.getItem('profiles') || '[]');
      if (!saved.some(p => p.id === profileId)) {
        saved.push({ name, id: profileId, password });
        localStorage.setItem('profiles', JSON.stringify(saved));
      }
      await loadProfile(profileId, password);
    } catch (e) {
      alert('Error creating profile: ' + e.message);
    }
  }
  
  function showProfileManager() {
    const saved = JSON.parse(localStorage.getItem('profiles') || '[]');
    let html = '<div style="display:flex;flex-direction:column;gap:12px;max-height:400px;overflow-y:auto;">';
    
    if (saved.length > 0) {
      html += '<h3 style="margin:0 0 8px 0;">Your Profiles</h3>';
      saved.forEach(p => {
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surface-2);border-radius:6px;">
          <div>
            <div style="font-weight:600;">${p.name}</div>
            <div style="font-size:11px;color:var(--text-faint);">${p.id}</div>
          </div>
          <button class="btn sql" onclick="loadProfileClick('${p.id}')">Load</button>
        </div>`;
      });
    }
    
    html += `<hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      <h3 style="margin:8px 0;">New Profile</h3>
      <input type="text" id="newProfileName" placeholder="Profile name" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text);margin-bottom:8px;font-family:inherit;">
      <input type="text" id="newProfileId" placeholder="ID (no spaces)" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text);margin-bottom:8px;font-family:inherit;">
      <input type="password" id="newProfilePassword" placeholder="Password (optional)" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);color:var(--text);margin-bottom:8px;font-family:inherit;">
      <button class="btn sql" onclick="createProfileClick()" style="width:100%;">Create Profile</button>
      <button class="btn ghost" onclick="closeProfileManager()" style="width:100%;">Close</button>
    </div>`;
    
    const modal = document.createElement('div');
    modal.id = 'profileModal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;';
    modal.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;max-width:400px;width:90%;">${html}</div>`;
    document.body.appendChild(modal);
    
    window.loadProfileClick = function(id) {
      const profile = saved.find(p => p.id === id);
      if (profile && profile.password) {
        const pwd = prompt('Enter password:');
        if (pwd === null) return;
        loadProfile(id, pwd);
      } else {
        loadProfile(id, '');
      }
      modal.remove();
    };
    
    window.createProfileClick = function() {
      const name = document.getElementById('newProfileName').value.trim();
      const id = document.getElementById('newProfileId').value.trim();
      const pwd = document.getElementById('newProfilePassword').value;
      if (!name || !id) {
        alert('Name and ID required');
        return;
      }
      createProfile(name, id, pwd);
      modal.remove();
    };
    
    window.closeProfileManager = function() {
      modal.remove();
    };
  }
  
  function addProfileButton() {
    const header = document.querySelector('header');
    if (!header) return;
    let container = document.getElementById('profileControls');
    if (!container) {
      container = document.createElement('div');
      container.id = 'profileControls';
      container.style.cssText = 'display:flex;gap:12px;align-items:center;margin-top:8px;';
      header.appendChild(container);
    }
    const profileDisplay = document.createElement('div');
    profileDisplay.id = 'profileDisplay';
    profileDisplay.style.cssText = 'font-family:JetBrains Mono;font-size:12px;font-weight:600;color:var(--sql);';
    const switchBtn = document.createElement('button');
    switchBtn.className = 'btn sql';
    switchBtn.textContent = 'Switch Profile';
    switchBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
    switchBtn.onclick = showProfileManager;
    const logoutBtn = document.createElement('button');
    logoutBtn.className = 'btn ghost';
    logoutBtn.textContent = 'Logout';
    logoutBtn.style.cssText = 'padding:6px 12px;font-size:12px;';
    logoutBtn.onclick = () => {
      localStorage.removeItem('currentProfile');
      localStorage.removeItem('profilePassword');
      currentProfile = null;
      currentPassword = '';
      showProfileManager();
    };
    container.innerHTML = '';
    if (currentProfile) {
      profileDisplay.textContent = `Profile: ${currentProfile.id}`;
      container.appendChild(profileDisplay);
    }
    container.appendChild(switchBtn);
    container.appendChild(logoutBtn);
  }
  
  const originalPersist = persist;
  persist = function() {
    originalPersist();
    saveProfile();
  };
  
  const originalInit = init;
  init = async function() {
    const savedProfile = localStorage.getItem('currentProfile');
    const savedPassword = localStorage.getItem('profilePassword') || '';
    
    addProfileButton();
    
    if (savedProfile) {
      await loadProfile(savedProfile, savedPassword);
    } else {
      showProfileManager();
    }
  };
  
  init();
})();
</script>
